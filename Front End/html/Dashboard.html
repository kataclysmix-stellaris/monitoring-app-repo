<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <h1>Dashboard</h1>
    <p>Welcome, <span id="user"></span>!</p>

    <button id="editBtn">Edit Dashboard</button>

    <p id="message"></p>

    <button onclick="logout()">Logout</button>

    <script src="script.js"></script>
    <div class="card">
  <h3>CPU</h3>
  <svg width="300" height="120">
    <polyline 
      fill="none" 
      stroke="#4aa3ff" 
      stroke-width="3"
      points="0,80 40,60 80,70 120,40 160,60 200,30 240,50 280,20" />
  </svg>
</div>

<style>
.card {
  width: 320px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-family: sans-serif;
}
</style>
<div class="card">
  <h3>Memory</h3>
  <svg width="300" height="120">
    <polyline 
      fill="none" 
      stroke="green" 
      stroke-width="3"
      points="0,60 40,58 80,62 120,59 160,61 200,60 240,58 280,61" />
  </svg>
</div>
<div class="card">
  <h3>Storage</h3>
  <div class="pie"></div>
</div>

<style>
.pie {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: conic-gradient(
    gold 0% 10%,
    skyblue 10% 35%,
    lightcoral 35% 100%
  );
  margin: 10px auto;
  transform: scaleX(-1);
}
</style>

</body>
</html>
