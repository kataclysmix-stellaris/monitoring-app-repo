<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="./dist/output.css">

    <title>System Dashboard</title>
    <script src="../node_modules/flowbite/dist/flowbite.min.js"></script>
    <style>

        body { 
            padding: 20px;
            background-color: #1c2029;
        }

        h1, h2 { 
            margin: 0 0 10px;
            color: white;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            padding: 10px;
            border-radius: 25px;
            width: 400px; 
        }
        canvas { 
            background-color: #ffffff;
            border-radius: 5px; 
            border-style: double;
            border-color: white;
            
        }

    </style>
</head>

<body>
        <h1>Monitoring Dashboard</h1>
        
            <h2>Welcome, <span id="user"></span>!</h2>
            <p id="message"></p> <div class="dashboard">
                
                <div class="top">

                <div class="card">
                    <h3>CPU Utilization</h3>
                        <div class="container">
                            <div class="flex justify-center bg-gray-100 p-5 rounded-lg shadow-lg">
                                <canvas id="cpuChart" width="400" height="200"></canvas>
                            </div>
                        </div>
                </div> 
                
                <div class="card">     
                    <h3>RAM Usage</h3>

                    <div id="ramChart" height="150"></div>
                </div>
                
                <div class="card">
                    <h3>Storage</h3>

                    <div id="storageChart" height="150"></div>
                </div> 
            </div>
        </div> 
        
        <div class="bottom">
            <div class="card">
                <h3>NAND</h3>
                <p>Type: </p>
                <p>Channel: </p>
            </div> 
            
            <div class="card"> 
                <h3>Node Status</h3>
            </div> 
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
        <script src="script.js"></script>


    <button type="button" id="logout_button" onclick="logout()">Logout</button>

</body>
</html>
