<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="frontend.css">
</head>
<body>
    <h2>Login</h2>
    <p id="error" style="color:red;"></p>

    <label for="username">Username</label>
    <input type="text" id="username" required placeholder="Enter your username" title="Username">

    <label for="password">Password</label>
    <input type="password" id="password" required placeholder="Enter your password" title="Password">

    <button onclick="login()">Login</button>

    <script src="script.js"></script>
</body>
</html>
