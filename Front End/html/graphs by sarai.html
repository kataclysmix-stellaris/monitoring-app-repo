<!DOCTYPE html>
<html>
<head>
  <title>System Monitor Simulation</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>System Monitor (updated version, should hook up to PostgreSQL)</h2>

<div style="display: flex; gap: 10px; flex-wrap: wrap;">
  <canvas id="cpuChart" width="300" height="150"></canvas>
  <canvas id="gpuChart" width="300" height="150"></canvas>
  <canvas id="storageChart" width="300" height="150"></canvas>
  <canvas id="tempChart" width="300" height="150"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const WINDOW_MS = 5 * 60 * 1000; // 5-minute rolling window
let lastTimestamp = null;

// ----- Create charts -----
function createChart(ctx, label, color, yConfig = {}) {
  return new Chart(ctx, {
    type: 'line',
    data: { datasets: [{ label, data: [], borderColor: color, pointRadius: 0, tension: 0.2 }] },
    options: {
      animation: false,
      parsing: false,
      responsive: true,
      scales: {
        x: { type: 'time' },
        y: yConfig
      }
    }
  });
}

const cpuChart = createChart(document.getElementById('cpuChart').getContext('2d'), 'CPU %', 'red', { min: 0, max: 100 });
const gpuChart = createChart(document.getElementById('gpuChart').getContext('2d'), 'GPU %', 'purple', { min: 0, max: 100 });
const storageChart = createChart(document.getElementById('storageChart').getContext('2d'), 'Storage %', 'blue', { min: 0, max: 100 });
const tempChart = createChart(document.getElementById('tempChart').getContext('2d'), 'Temperature °F', 'orange', { suggestedMin: 60, suggestedMax: 100 });

const charts = [cpuChart, gpuChart, storageChart, tempChart];

// ----- Add a point to charts -----
function addPoint(row) {
  const t = new Date(row.recorded_at || Date.now()); // fallback if no recorded_at
  if (row.cpu != null) cpuChart.data.datasets[0].data.push({ x: t, y: row.cpu });
  if (row.gpu != null) gpuChart.data.datasets[0].data.push({ x: t, y: row.gpu });
  if (row.storage != null) storageChart.data.datasets[0].data.push({ x: t, y: row.storage });
  if (row.temp != null) tempChart.data.datasets[0].data.push({ x: t, y: row.temp });
}

// ----- Trim charts to rolling window -----
function trimWindow() {
  const cutoff = Date.now() - WINDOW_MS;
  charts.forEach(chart => {
    chart.data.datasets[0].data = chart.data.datasets[0].data.filter(p => p.x >= cutoff);
  });
}

// ----- Update charts -----
function updateAll() {
  charts.forEach(chart => chart.update('none'));
}

// ----- Fetch initial data -----
async function loadInitial() {
  const res = await fetch('/api/telemetry'); // your backend endpoint
  const data = await res.json();
  data.forEach(addPoint);
  if (data.length) lastTimestamp = data[data.length - 1].recorded_at;
  updateAll();
}

// ----- Poll for incremental updates -----
async function poll() {
  if (!lastTimestamp) return;
  const res = await fetch(`/api/telemetry/since?since=${lastTimestamp}`);
  const data = await res.json();
  data.forEach(addPoint);
  if (data.length) lastTimestamp = data[data.length - 1].recorded_at;
  trimWindow();
  updateAll();
}

// ----- Initialize -----
loadInitial();
setInterval(poll, 1000);
</script>
</body>
</html>
