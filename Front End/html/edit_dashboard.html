<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link rel="stylesheet" href="edit_dashboard.css">
    <script src="vmCheckThingy.js" async="false"></script>
</head>

<style>
    /* David Porter: Is there a reason we are putting styling here and not in the CSS style sheet? Just asking.*/
</style>

<body>
    <h1>Dashboard</h1>
    <p>Welcome, <span id="user"></span>!</p>

    <a href="Dashboard.html" onclick="editDashboard()" class="button">Edit Dashboard</a>

    <p id="message"></p>


    <table class="full-width">

      <tr>
        <td colspan="1">
          <h1>Dashboard</h1>
        </td>
        <td>
          <h1 align="center">Graphs</h1>
        </td>
      </tr>
      <tr>
        <td colspan="1">
          <!-- This area is a bit tough to work on considering that there's not many graphs or things to work with interactively atm - htw -->
          <details class="node" open="true"> 
            <summary class="nodeName">Node 1</summary>
            <ul>
              <li class="vmObject" id="one1">VM 1</li> <!-- Critical example -->
              <li class="vmObject" id="one2">VM 2</li>
              <li class="vmObject" id="one3">VM 3</li>
              <li class="vmObject" id="one4">VM 4</li>
              <li class="vmObject" id="one5">VM 5</li>
            </ul>
          </details>
          <details class="node">
            <summary class="nodeName">Node 2</summary>
            <ul>
              <li class="vmObject" id="two1">VM 1</li>
              <li class="vmObject" id="two2">VM 2</li>
              <li class="vmObject" id="two3">VM 3</li>
              <li class="vmObject" id="two4">VM 4</li>
              <li class="vmObject" id="two5">VM 5</li>
            </ul>
          </details>
          <details class="node">
            <summary class="nodeName">Node 3</summary>
            <ul>
              <li class="vmObject" id="three1">VM 1</li>
              <li class="vmObject" id="three2">VM 2</li>
              <li class="vmObject" id="three3">VM 3</li>
              <li class="vmObject" id="three4">VM 4</li>
              <li class="vmObject" id="three5">VM 5</li>
            </ul>
          </details>
        </td>
        <td rowspan="7" width="1000px"></td>
      </tr>
    </table>

    <button onclick="logout()">Logout</button>
</body>
</html>
