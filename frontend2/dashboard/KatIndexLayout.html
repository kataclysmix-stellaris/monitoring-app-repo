<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="src/KatStyle.css">

    <title>System Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>

        h1, h2 { 
            margin: 0 0 10px;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            display: block;
            padding: 10px;
            border-radius: 25px;
            width: 400px; 
        }
        canvas { 
            background-color: #4e148c;
            border-radius: 5px;
            border: 2px solid rgba(255,255,255,0.55);
            color: aliceblue;
        }

    </style>
</head>

<body>
        <h1>Monitoring Dashboard</h1>
        
            <h2>Welcome, <span id="user"></span>!</h2>
            <p id="message"></p> 
            <div class="dashboard">
                <div class="top">

                    <div class="card">
                        <h3>CPU Utilization</h3> 
                        <canvas id="cpuChart" height="150"></canvas>
                    </div> 
                    
                    <div class="card">     
                        <h3>RAM Usage</h3>
                        <canvas id="ramChart" height="150"></canvas>
                    </div>
                    
                    <div class="card">
                        <h3>Storage</h3>
                        <canvas id="storageChart" height="150"></canvas>
                    </div> 

                </div>
            
                <div class="bottom">

                    <div class="card">
                        <h3>NAND</h3>
                        <p>Type: <span id="nandtype"></span></p>
                        <p>Channel: <span id="nandchannel"></span></p>
                    </div> 
                    
                    <div class="card">
                        <h3>Thermal</h3>
                        <p>CPU Temperature: <span class="text-orange-400" id="cpu-temp">65°F</span></p>
                        <p>System Temperature: <span class="text-blue-300" id="sys-temp">80°F</span></p>
                    </div>
                    
                    <div class="card"> 
                        <h3>Node Status:</h3>
                        <p id="node-status" class="text-2xl text-lime-600"></p>
                    </div> 

                </div>

                <div style="display: block; justify-self: end;">

                    <button type="button" onclick="logout()">Logout</button>

                </div>

            </div> 

        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        // 30 seconds in milliseconds
        const intervalMs = 30 * 1000; 30000;
    </script>


    <script type="module" src="./src/main.js"></script>
    <script src="./src/script.js"></script>
</body>
</html>
